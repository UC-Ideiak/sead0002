                        "Asertividad como herramienta de entrevista y exposición"
                    ]
                },
                {
                    number: 5,
                    title: "Peritación de la Práctica Preventiva: Ergonomía y Psicosociología en el Trabajo",
                    hours: 30,
                    objective: "Analizar y aplicar la normativa vigente en PRL en relación con la especialidad de Ergonomía y Psicosociología, y ser capaz de realizar informes periciales en relación con la misma.",
                    knowledge: [
                        "Peritación de la Ergonomía y Psicosociología en el Trabajo",
                        "Trastornos músculo esqueléticos en miembros superiores e inferiores",
                        "Métodos de evaluación en Ergonomía",
                        "Criterios de Aplicación",
                        "Estrés Laboral y sus manifestaciones",
                        "Métodos de evaluación en psicosociología",
                        "Identificación de factores a considerar en su peritación",
                        "Particularidades de los Informes periciales en Ergonomía y Psicosociología en el trabajo",
                        "Redacción del informe pericial en ergonomía y psicosociología en el trabajo"
                    ],
                    skills: [
                        "Precisión y exactitud en la narración y redacción de los hechos que han ocasionado el requerimiento del informe en la especialidad Ergonomía y Psicosociología en el trabajo",
                        "Asertividad como herramienta de entrevista y exposición"
                    ]
                },
                {
                    number: 6,
                    title: "La Defensa del Informe Pericial en Sala",
                    hours: 30,
                    objective: "Desarrollar habilidades comunicativas para ser capaz de defender el informe pericial en el acto judicial de un modo veraz, objetivo y seguro.",
                    knowledge: [
                        "El perito como orador",
                        "La comunicación en sala",
                        "El lenguaje del cuerpo",
                        "La voz, un instrumento frágil y valioso",
                        "La preparación de la intervención",
                        "Tipos de discurso",
                        "El lenguaje",
                        "Estrategias para la hora de la verdad",
                        "El diálogo y las preguntas"
                    ],
                    skills: [
                        "Expresión oral clara y decoro profesional en la exposición en sala",
                        "Capacidad de elocuencia y expresión en sala",
                        "Demostración de seguridad en la argumentación en sala"
                    ]
                }
            ]
        };

        let currentModule = 0;
        let completedModules = new Set();

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebarOverlay');
            sidebar.classList.toggle('open');
            overlay.classList.toggle('show');
        }

        function updateProgress() {
            const percent = Math.round((completedModules.size / 6) * 100);
            document.getElementById('progressFill').style.width = percent + '%';
            document.getElementById('progressText').textContent = percent + '% Completado';
        }

        function markComplete(moduleNum) {
            if (completedModules.has(moduleNum)) {
                completedModules.delete(moduleNum);
            } else {
                completedModules.add(moduleNum);
            }
            updateProgress();
            renderModule(moduleNum);
        }

        function showModule(num) {
            currentModule = num;
            
            // Update active nav
            document.querySelectorAll('.nav-item').forEach((item, index) => {
                item.classList.remove('active');
            });
            document.querySelectorAll('.nav-item')[num].classList.add('active');
            
            // Close sidebar on mobile
            document.getElementById('sidebar').classList.remove('open');
            document.getElementById('sidebarOverlay').classList.remove('show');
            
            if (num === 0) {
                renderOverview();
            } else {
                renderModule(num);
            }
        }

        function renderOverview() {
            const content = document.getElementById('contentArea');
            const data = courseData.overview;
            
            let structureHTML = '';
            data.structure.forEach((block, i) => {
                structureHTML += `
                    <div class="block-card">
                        <div class="block-header">
                            <i data-lucide="layers" style="width: 18px; height: 18px;"></i>
                            ${block.title}
                            <span style="margin-left: auto; opacity: 0.8; font-weight: 500;">${block.hours}h</span>
                        </div>
                        <div class="block-content">
                            <ul class="topic-list">
                                ${block.modules.map(m => `<li class="topic-item"><span class="topic-bullet"></span><span class="topic-text">${m}</span></li>`).join('')}
                            </ul>
                        </div>
                    </div>
                `;
            });

            let objectivesHTML = data.objectives.map(o => `<li class="topic-item"><span class="topic-bullet"></span><span class="topic-text">${o}</span></li>`).join('');
            let skillsHTML = data.skills.map(s => `<li class="topic-item"><span class="topic-bullet"></span><span class="topic-text">${s}</span></li>`).join('');

            content.innerHTML = `
                <div class="module-header fade-in">
                    <span class="module-number">SEAD0002</span>
                    <h1 class="module-title">${data.title}</h1>
                    <p style="opacity: 0.9; font-size: 0.95rem; line-height: 1.7;">${data.description}</p>
                    <div class="module-meta">
                        <span class="meta-item"><i data-lucide="clock" style="width: 16px; height: 16px;"></i> ${data.totalHours} horas totales</span>
                        <span class="meta-item"><i data-lucide="layers" style="width: 16px; height: 16px;"></i> ${data.modules} módulos</span>
                    </div>
                    <div class="action-buttons fade-in" style="justify-content: flex-start; margin-top: 1.5rem;">
                        <button class="btn btn-gold" onclick="window.location.href='modulo1.html'">
                            <i data-lucide="play-circle" style="width: 18px; height: 18px;"></i>
                            Comenzar el Curso
                        </button>
                    </div>
                </div>

                <div class="content-card fade-in">
                    <h2 class="card-title">
                        <i data-lucide="map" style="width: 20px; height: 20px; color: var(--gold);"></i>
                        Estructura del Curso
                    </h2>
                    ${structureHTML}
                </div>

                <div class="content-card fade-in">
                    <h2 class="card-title">
                        <i data-lucide="target" style="width: 20px; height: 20px; color: var(--red-primary);"></i>
                        Objetivos Generales
                    </h2>
                    <ul class="topic-list">${objectivesHTML}</ul>
                </div>

                <div class="content-card fade-in">
                    <h2 class="card-title">
                        <i data-lucide="award" style="width: 20px; height: 20px; color: var(--gold);"></i>
                        Competencias Profesionales
                    </h2>
                    <ul class="topic-list">${skillsHTML}</ul>
                </div>

                <div class="highlight-box fade-in">
                    <div class="highlight-title">
                        <i data-lucide="lightbulb" style="width: 16px; height: 16px;"></i>
                        Nota Importante
                    </div>
                    <p class="highlight-text">Este programa formativo combina fundamentos teóricos con aplicaciones prácticas, preparando al alumnado para actuar con solvencia técnica, rigor ético y eficacia comunicativa en el auxilio a la Administración de Justicia.</p>
                </div>
            `;
            
            lucide.createIcons();
        }

        function renderModule(num) {
            const content = document.getElementById('contentArea');
            const data = courseData.modules[num];
            const isCompleted = completedModules.has(num);
            
            let knowledgeHTML = data.knowledge.map(k => `<li class="topic-item"><span class="topic-bullet"></span><span class="topic-text">${k}</span></li>`).join('');
            let skillsHTML = data.skills.map(s => `<li class="topic-item"><span class="topic-bullet"></span><span class="topic-text">${s}</span></li>`).join('');

            content.innerHTML = `
                <div class="module-header fade-in">
                    <span class="module-number">MÓDULO ${data.number} DE 6</span>
                    <h1 class="module-title">${data.title}</h1>
                    <div class="module-meta">
                        <span class="meta-item"><i data-lucide="clock" style="width: 16px; height: 16px;"></i> ${data.hours} horas</span>
                        <span class="meta-item"><i data-lucide="${isCompleted ? 'check-circle' : 'circle'}" style="width: 16px; height: 16px;"></i> ${isCompleted ? 'Completado' : 'Pendiente'}</span>
                    </div>
                </div>

                <div class="content-card fade-in">
                    <div class="objective-box">
                        <div class="objective-label">Objetivo del Módulo</div>
                        <p class="objective-text">${data.objective}</p>
                    </div>

                    <div class="tab-container">
                        <button class="tab-btn active" onclick="switchTab(event, 'knowledge-${num}')">Conocimientos</button>
                        <button class="tab-btn" onclick="switchTab(event, 'skills-${num}')">Competencias</button>
                    </div>

                    <div id="knowledge-${num}" class="tab-content active">
                        <h3 class="card-title" style="font-size: 1.1rem; margin-top: 1rem;">
                            <i data-lucide="book-open" style="width: 18px; height: 18px; color: var(--gold);"></i>
                            Conocimientos / Capacidades cognitivas y prácticas
                        </h3>
                        <ul class="topic-list">${knowledgeHTML}</ul>
                    </div>

                    <div id="skills-${num}" class="tab-content">
                        <h3 class="card-title" style="font-size: 1.1rem; margin-top: 1rem;">
                            <i data-lucide="users" style="width: 18px; height: 18px; color: var(--gold);"></i>
                            Habilidades de gestión, personales y sociales
                        </h3>
                        <ul class="topic-list">${skillsHTML}</ul>
                    </div>
                </div>

                <div class="action-buttons fade-in">
                    <button class="btn btn-secondary" onclick="showModule(${num === 1 ? 6 : num - 1})">
                        <i data-lucide="arrow-left" style="width: 16px; height: 16px;"></i>
                        Módulo Anterior
                    </button>
                    <button class="btn ${isCompleted ? 'btn-secondary' : 'btn-gold'}" onclick="markComplete(${num})">
                        <i data-lucide="${isCompleted ? 'rotate-ccw' : 'check'}" style="width: 16px; height: 16px;"></i>
                        ${isCompleted ? 'Desmarcar' : 'Marcar como Completado'}
                    </button>
                    <button class="btn btn-primary" onclick="showModule(${num === 6 ? 1 : num + 1})">
                        Módulo Siguiente
                        <i data-lucide="arrow-right" style="width: 16px; height: 16px;"></i>
                    </button>
                </div>
            `;
            
            lucide.createIcons();
        }

        function switchTab(event, tabId) {
            // Remove active from all tabs in the same container
            const container = event.target.parentElement;
            container.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            // Hide all tab contents in the same parent
            const parent = container.parentElement;
            parent.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
        }

        // Initialize
        showModule(0);
        updateProgress();
    </script>
</body>
</html>
